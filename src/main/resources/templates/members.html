<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Members</title>
    <link rel="stylesheet" href="/custom.css">
</head>
<body>

<h1>Members</h1>

<div class="card">
    <ul class="member-list">
        <li th:each="m : ${members}" class="member-item">
            <span th:text="${m.name}"></span> -
            <span th:text="${m.bio}"></span>

            <span class="actions">
                <a th:href="@{/edit-member/{id}(id=${m.id})}">Edit</a>
                <span th:if="${m != null and !m.groupMember}">|</span>
                <a th:if="${m != null and !m.groupMember}"
                   th:href="@{/delete-member/{id}(id=${m.id})}"
                   onclick="return confirm('Are you sure you want to delete this member?')">
                    Delete
                </a>
            </span>
        </li>
    </ul>
</div>

<div class="nav-links">
    <a class="nav-button" href="/add-member">Add Member</a>
    <a class="nav-button" href="/about">Back to About Page</a>
</div>

</body>
</html>
