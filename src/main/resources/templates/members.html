<h1>Members</h1>

<head>
    <link rel="stylesheet" href="/custom.css">
</head>

<ul>
    <li th:each="m : ${members}">
        <span th:text="${m.name}"></span> -
        <span th:text="${m.bio}"></span>
        <a th:href="@{/edit-member/{id}(id=${m.id})}">Edit</a>
    </li>
</ul>

<a href="/add-member">Add Member</a>
