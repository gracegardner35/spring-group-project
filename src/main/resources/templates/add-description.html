<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Description</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>Add a New Description</h1>
    <nav>
        <a th:href="@{/}">Home</a> |
        <a th:href="@{/descriptions}">View Descriptions</a>
    </nav>
</header>

<main>
    <form th:action="@{/descriptions/add}" th:object="${description}" method="post">
        <div>
            <label for="title">Title:</label>
            <input type="text" id="title" th:field="*{title}" placeholder="Enter title"
                   required class="form-control">
        </div>

        <div>
            <label for="content">Description:</label>
            <textarea id="content" th:field="*{content}" placeholder="Enter description"
                      rows="5" required class="form-control"></textarea>
        </div>

        <div>
            <button type="submit">Add Description</button>
        </div>
    </form>

    <div th:if="${#fields.hasErrors()}">
        <p style="color:red;">Please fix the errors above.</p>
    </div>
</main>

<footer>
    <p>&copy; Project 4</p>
</footer>
</body>
</html>
