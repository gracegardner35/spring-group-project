<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Member</title>
    <link rel="stylesheet" href="/custom.css">
</head>
<body>

<h1>Add Member</h1>

<form action="/add-member" method="post">

    <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name">
    </div>

    <div class="form-group">
        <label>Bio:</label>
        <input type="text" name="bio">
    </div>

    <!-- ✅ NEW Fun Fact field -->
    <div class="form-group">
        <label>Fun Fact:</label>
        <input type="text" name="funFact" placeholder="I love hiking, I have a pet gecko, etc.">
    </div>

    <button type="submit">Add</button>

</form>

<div class="nav-links">
    <a class="nav-button" href="/about">Back to About Page</a>
    <a class="nav-button" href="/members">Back to Members</a>
</div>

</body>
</html>
