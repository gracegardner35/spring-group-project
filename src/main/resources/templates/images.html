<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add Member with Image</title>
</head>
<body>
<h1>Add New Member</h1>

<form th:action="@{/members}" method="post" enctype="multipart/form-data" th:object="${member}">

  <label>Name:</label>
  <input type="text" th:field="*{name}" placeholder="Enter member name" required/>
  <br/><br/>

  <label>Upload Image:</label>
  <input type="file" name="imageFile" accept="image/*"/>
  <br/><br/>

  <button type="submit">Save Member</button>
</form>

<hr/>

<div th:if="${member != null && member.imageName != null}">
  <h3>Uploaded Image Preview:</h3>
  <img th:src="@{/images/{fileName}(fileName=${member.imageName})}"
       alt="Member Image" width="200"/>
</div>

</body>
</html>
